PACKAGE_NAME="qcom-pmi8998-wakeirq-fix"
# 1.0 -- initial wakeirq leak fix (devm_add_action_or_reset).
# 1.1 -- also disables charger safety timers and forces a 0->1 edge on
#        CHARGING_ENABLE_CMD during probe, so a latched SFT_EXPIRE error
#        recovers automatically on driver rebind (no reboot needed).
# The historical package name is kept to preserve DKMS state across the
# bump; scope is broader than wakeirq now. See kernel-patch/README.md.
PACKAGE_VERSION="1.1"

BUILT_MODULE_NAME[0]="qcom_pmi8998_charger"
# Install under /lib/modules/$KVER/updates/, which takes precedence over the
# in-tree module in /lib/modules/$KVER/kernel/drivers/power/supply/ once
# depmod has run. This avoids ever overwriting the distro-provided .ko file.
DEST_MODULE_LOCATION[0]="/updates"

MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Automatically rebuild on every kernel upgrade. The DKMS hook in
# /etc/kernel/postinst.d/ runs before initramfs-tools and before the Mobian
# zz-qcom-bootimg hook, so the patched module ends up inside the new
# initramfs and then inside the Android boot.img that gets dd'd to the
# active boot partition -- no manual steps are needed on kernel upgrades.
AUTOINSTALL="yes"
